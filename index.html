<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Transit Gwalior - Login</title>
  <meta name="description" content="Login to the Transport Route and Fare Management System for Gwalior city buses.">
  <link rel="stylesheet" href="style.css">
  <script src="theme.js"></script>
  <!-- SVG Icons via Lucide CDN (From frontend/app.js) -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<style>
  @media(min-width: 800px){ #desktop-image-panel{ display:block !important; } }
</style>
<body>

<!-- Animated background orbs -->
<div class="animated-bg"></div>

<!-- Top Navbar -->
<!-- Navbar -->
<nav class="navbar" style="position:fixed; top:0; left:0; width:100%; display:flex; align-items:center; justify-content:space-between; padding:0 32px; height:64px; background:var(--navbar-bg); border-bottom:1px solid var(--border); z-index:100;">
  <div class="navbar-left" style="display:flex; align-items:center;">
    <a class="navbar-brand" href="index.html" style="display:flex; align-items:center; gap:12px; text-decoration:none;">
      <i data-lucide="bus-front" style="color:var(--brown); width:28px; height:28px;"></i>
      <span style="font-size:16px; font-weight:700; color:var(--text-primary);"><em>Smart Transit</em> Gwalior</span>
    </a>
  </div>
  <div class="navbar-center" style="display:none; @media(min-width:768px){display:flex;} gap:24px; position:absolute; left:50%; transform:translateX(-50%); font-weight:500; font-size:14px;">
    <a href="index.html" style="color:var(--text-primary); text-decoration:none;">Home</a>
    <a href="selection.html" style="color:var(--text-primary); text-decoration:none;">Routes</a>
    <a href="selection.html" style="color:var(--text-primary); text-decoration:none;">Book Ride</a>
    <a href="#" style="color:var(--text-primary); text-decoration:none;">Explore</a>
  </div>
  <div class="navbar-right" style="display:flex; align-items:center; gap:16px;">
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme" style="background:transparent; border:none; font-size:18px; cursor:pointer;">
      <i data-lucide="sun" class="icon-sun" style="display:none; width:18px; color:var(--brown);"></i>
      <i data-lucide="moon" class="icon-moon" style="width:18px; color:var(--brown);"></i>
    </button>
    <div class="navbar-user" style="display:flex; align-items:center; gap:8px;">
      <div class="avatar" style="width:32px; height:32px; background:var(--bg-glass); border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--brown);">
        <i data-lucide="user" style="width:16px;"></i>
      </div>
      <span id="nav-username" style="font-size:14px; font-weight:600; color:var(--text-primary);">Guest</span>
    </div>
    <button class="btn btn-logout" onclick="sessionStorage.clear(); window.location.href='index.html';" style="padding:6px 16px; font-size:13px; border-radius:8px; display:flex; align-items:center; gap:6px;">
      <i data-lucide="log-out" style="width:14px;"></i> Logout
    </button>
  </div>
</nav>


<!-- Login Card -->
<div class="page-center" style="padding-top:80px; display:flex; gap: 40px; max-width:1100px; margin:0 auto; padding-left:20px; padding-right:20px;">
  
  <div style="flex:1; border-radius:24px; overflow:hidden; display:none;" id="desktop-image-panel">
    <img src="login_image.png" style="width:100%; height:100%; min-height: 500px; object-fit:cover; display:block;" alt="Smart City Transit">
  </div>

  <div class="login-card card" style="flex:1; max-width: 440px;">

    <div class="login-header">
      <div class="login-logo">T</div>
      <h1>Transport Route &amp; Fare</h1>
      <p>Management System — Gwalior</p>
    </div>

    <!-- Login Type Tabs -->
    <div class="tab-group">
      <button class="tab-btn active" id="tab-passenger" onclick="switchTab('passenger')">
        Passenger Login
      </button>
      <button class="tab-btn" id="tab-admin" onclick="switchTab('admin')">
        Admin Login
      </button>
    </div>

    <!-- Error message -->
    <div class="error-msg" id="error-msg">Invalid credentials. Please try again.</div>

    <!-- Username -->
    <div class="form-group">
      <label>Username</label>
      <div class="input-icon-wrap with-icon">
        <span class="icon" style="font-size: 14px; opacity: 0.5;">U</span>
        <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
      </div>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label>Password</label>
      <div class="input-icon-wrap with-icon">
        <span class="icon" style="font-size: 14px; opacity: 0.5;">P</span>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
      </div>
    </div>

    <!-- Submit -->
    <button class="btn btn-primary" id="login-btn" onclick="handleLoginSubmit()" style="margin-bottom: 12px;">
      <span id="btn-text">Login as Passenger</span>
      <span class="spinner" id="spinner"></span>
    </button>

    <!-- Sign Up Toggle link -->
    <div id="signup-toggle-div" style="text-align:center; font-size:13px;">
       <span id="toggle-desc">New user?</span> 
       <a href="#" onclick="toggleAuthMode()" style="color:var(--brown); font-weight:600; text-decoration:underline;" id="toggle-link">Sign up</a>
    </div>

    <p id="admin-creds-info" style="text-align:center;font-size:12px;color:var(--text-muted);margin-top:20px;">
      Admin credentials: <strong style="color:var(--text-secondary)">admin / admin123</strong>
    </p>
  </div>
</div>


<script src="app.js"></script>
</body>
</html>
